# ============================================
# PQG6 — Docker Swarm Stack (4-Machine Cluster)
# ============================================
# Deploy across 4 laptops connected via switch.
#
# Setup:
#   1. Manager:  docker swarm init --advertise-addr <YOUR_IP>
#   2. Workers:  docker swarm join --token <TOKEN> <MANAGER_IP>:2377
#   3. Label the 24 GB laptop:
#        docker node update --label-add ram=24gb <NODE_ID>
#   4. Deploy:   docker stack deploy -c docker-compose.swarm.yaml pqg6
#
# Memory: 8 GB workers on 16 GB laptops, 12 GB on 24 GB laptop

version: "3.8"

# ---- HDFS ----

services:
  namenode:
    image: hadoop-namenode:3.3.6
    hostname: namenode
    ports:
      - "9870:9870"
      - "9000:9000"
    environment:
      - CLUSTER_NAME=pqg6
      - HDFS_REPLICATION=3
    volumes:
      - namenode_data:/hadoop/dfs/name
    networks:
      - pqg6-overlay
    deploy:
      placement:
        constraints: [node.role == manager]

  datanode-1:
    image: hadoop-datanode:3.3.6
    hostname: datanode-1
    environment:
      - CLUSTER_NAME=pqg6
      - CORE_CONF_fs_defaultFS=hdfs://namenode:9000
    volumes:
      - datanode_data:/hadoop/dfs/data
    networks:
      - pqg6-overlay
    deploy:
      placement:
        constraints: [node.role == worker]
      replicas: 3

  # ---- Kafka (KRaft — manager only) ----

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    hostname: kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: "broker,controller"
      KAFKA_LISTENERS: "PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://kafka:9092"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka:9093"
      KAFKA_LOG_DIRS: "/var/lib/kafka/data"
      CLUSTER_ID: "pqg6-kafka-cluster-001"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    volumes:
      - kafka_data:/var/lib/kafka/data
    networks:
      - pqg6-overlay
    deploy:
      placement:
        constraints: [node.role == manager]

  # ---- Spark ----

  spark-master:
    image: apache/spark:3.5.1
    hostname: spark-master
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.master.Master
    ports:
      - "8080:8080"
      - "7077:7077"
    networks:
      - pqg6-overlay
    deploy:
      placement:
        constraints: [node.role == manager]

  # Workers on the 16 GB laptops (8 GB each)
  spark-worker-8g:
    image: apache/spark:3.5.1
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker spark://spark-master:7077
    environment:
      - SPARK_WORKER_MEMORY=8g
      - SPARK_WORKER_CORES=4
    networks:
      - pqg6-overlay
    deploy:
      replicas: 2
      placement:
        constraints:
          - node.role == worker
          - node.labels.ram != 24gb

  # Worker on the 24 GB laptop (12 GB)
  spark-worker-12g:
    image: apache/spark:3.5.1
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker spark://spark-master:7077
    environment:
      - SPARK_WORKER_MEMORY=12g
      - SPARK_WORKER_CORES=4
    networks:
      - pqg6-overlay
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.labels.ram == 24gb

  # ---- Flink (manager only) ----

  flink-jobmanager:
    image: pqg6-flink-processor:latest
    hostname: flink-jobmanager
    command: jobmanager
    ports:
      - "8081:8081"
    environment:
      - |
        FLINK_PROPERTIES=
        jobmanager.rpc.address: flink-jobmanager
        taskmanager.numberOfTaskSlots: 4
    networks:
      - pqg6-overlay
    deploy:
      placement:
        constraints: [node.role == manager]

  flink-taskmanager:
    image: pqg6-flink-processor:latest
    command: taskmanager
    environment:
      - |
        FLINK_PROPERTIES=
        jobmanager.rpc.address: flink-jobmanager
        taskmanager.numberOfTaskSlots: 4
        taskmanager.memory.process.size: 2g
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
    networks:
      - pqg6-overlay
    deploy:
      placement:
        constraints: [node.role == manager]

  # ---- Dashboard (manager only) ----

  dashboard:
    image: pqg6-dashboard:latest
    hostname: dashboard
    ports:
      - "3000:3000"
    environment:
      - KAFKA_BROKERS=kafka:9092
      - WEBHDFS_URL=http://namenode:9870
    networks:
      - pqg6-overlay
    deploy:
      placement:
        constraints: [node.role == manager]

# ---- Volumes ----

volumes:
  namenode_data:
  datanode_data:
  kafka_data:

# ---- Overlay Network ----

networks:
  pqg6-overlay:
    driver: overlay
    attachable: true
