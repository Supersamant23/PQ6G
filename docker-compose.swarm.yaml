# ============================================
# PQG6 — Docker Swarm Stack (Distributed LAN)
# ============================================
# Deploys across 4 machines connected via Gigabit switch.
#
# Prerequisites:
#   1. All machines have Docker Desktop with Swarm enabled
#   2. Local registry running on manager: docker run -d -p 5000:5000 --restart always --name registry registry:2
#   3. Workers configured with insecure-registry: 192.168.50.1:5000
#   4. Node labels set:
#      docker node update --label-add role=manager   <laptop>
#      docker node update --label-add role=data      <machine-b>
#      docker node update --label-add role=analytics <machine-c>
#      docker node update --label-add role=processing <machine-d>
#
# Deploy:
#   docker stack deploy -c docker-compose.swarm.yaml pqg6

services:
  # ---- HDFS (Machine B: role=data) ----

  namenode:
    image: 192.168.50.1:5000/hadoop-namenode:3.3.6
    hostname: namenode
    ports:
      - "9870:9870"
      - "9000:9000"
    volumes:
      - namenode_data:/hadoop/dfs/name
    environment:
      - CLUSTER_NAME=pqg6
    networks:
      - pqg6-swarm
    deploy:
      placement:
        constraints: [node.labels.role == data]
      resources:
        limits:
          memory: 1g

  datanode:
    image: 192.168.50.1:5000/hadoop-datanode:3.3.6
    hostname: datanode
    volumes:
      - datanode_data:/hadoop/dfs/data
    environment:
      - CLUSTER_NAME=pqg6
    networks:
      - pqg6-swarm
    deploy:
      placement:
        constraints: [node.labels.role == data]
      resources:
        limits:
          memory: 1g

  # ---- Kafka (Manager: role=manager) ----

  kafka:
    image: 192.168.50.1:5000/cp-kafka:7.6.0
    hostname: kafka
    ports:
      - "9092:9092"
      - "9093:9093"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: "broker,controller"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka:29093"
      KAFKA_LISTENERS: "PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:29093,EXTERNAL://0.0.0.0:9093"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://kafka:9092,EXTERNAL://192.168.50.1:9093"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      CLUSTER_ID: "pqg6-kafka-cluster-001"
    volumes:
      - kafka_data:/var/lib/kafka/data
    networks:
      - pqg6-swarm
    deploy:
      placement:
        constraints: [node.labels.role == manager]
      resources:
        limits:
          memory: 1g

  # ---- Flink (Machine D: role=processing) ----

  flink-jobmanager:
    image: 192.168.50.1:5000/pqg6-flink-processor
    hostname: flink-jobmanager
    command: jobmanager
    ports:
      - "8081:8081"
    environment:
      - |
        FLINK_PROPERTIES=
        jobmanager.rpc.address: flink-jobmanager
        taskmanager.numberOfTaskSlots: 4
        parallelism.default: 2
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - FLINK_OUTPUT_PATH=hdfs://namenode:9000/flink-output
    networks:
      - pqg6-swarm
    deploy:
      placement:
        constraints: [node.labels.role == processing]
      resources:
        limits:
          memory: 1g

  flink-taskmanager:
    image: 192.168.50.1:5000/pqg6-flink-processor
    hostname: flink-taskmanager
    command: taskmanager
    environment:
      - |
        FLINK_PROPERTIES=
        jobmanager.rpc.address: flink-jobmanager
        taskmanager.numberOfTaskSlots: 4
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
    networks:
      - pqg6-swarm
    deploy:
      placement:
        constraints: [node.labels.role == processing]
      resources:
        limits:
          memory: 1g

  # ---- Spark (Machine C: role=analytics) ----

  spark-master:
    image: 192.168.50.1:5000/spark:3.5.1
    hostname: spark-master
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.master.Master
    ports:
      - "8080:8080"
      - "7077:7077"
    networks:
      - pqg6-swarm
    deploy:
      placement:
        constraints: [node.labels.role == analytics]
      resources:
        limits:
          memory: 1g

  spark-worker-1:
    image: 192.168.50.1:5000/spark:3.5.1
    hostname: spark-worker-1
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker spark://spark-master:7077
    environment:
      - SPARK_WORKER_MEMORY=2g
      - SPARK_WORKER_CORES=2
    networks:
      - pqg6-swarm
    deploy:
      placement:
        constraints: [node.labels.role == analytics]
      resources:
        limits:
          memory: 2g

  spark-worker-2:
    image: 192.168.50.1:5000/spark:3.5.1
    hostname: spark-worker-2
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker spark://spark-master:7077
    environment:
      - SPARK_WORKER_MEMORY=2g
      - SPARK_WORKER_CORES=2
    networks:
      - pqg6-swarm
    deploy:
      placement:
        constraints: [node.labels.role == analytics]
      resources:
        limits:
          memory: 2g

  # ---- NS-3 Simulator (Manager: role=manager) ----

  ns3-simulator:
    image: 192.168.50.1:5000/pqg6-ns3-simulator
    hostname: ns3-simulator
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - HDFS_NAMENODE=http://namenode:9870
    networks:
      - pqg6-swarm
    deploy:
      placement:
        constraints: [node.labels.role == manager]
      resources:
        limits:
          memory: 512m

  # ---- Dashboard (Manager: role=manager) ----

  dashboard:
    image: 192.168.50.1:5000/pqg6-dashboard
    hostname: pqg6-dashboard
    ports:
      - "3000:3000"
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - HDFS_NAMENODE=http://namenode:9870
    networks:
      - pqg6-swarm
    deploy:
      placement:
        constraints: [node.labels.role == manager]
      resources:
        limits:
          memory: 256m

# ---- Volumes ----

volumes:
  namenode_data:
  datanode_data:
  kafka_data:

# ---- Network ----

networks:
  pqg6-swarm:
    driver: overlay
    attachable: true
