# ============================================
# PQG6 — Root Docker Compose (Local Development)
# ============================================
# Orchestrates all modules on a single machine.
#
# Usage:
#   docker compose --profile full up -d     # Everything (~10-11 GB)
#   docker compose --profile dev up -d      # Kafka + Flink + Dashboard (~3 GB)
#   docker compose --profile ml up -d       # Kafka + Spark + HDFS (~7 GB)
#   docker compose down                     # Stop everything

# ---- HDFS / YARN ----

services:
  namenode:
    build:
      context: ./modules/hdfs-storage
      dockerfile: Dockerfile.namenode
    image: hadoop-namenode:3.3.6
    container_name: namenode
    hostname: namenode
    ports:
      - "9870:9870" # HDFS Web UI
      - "9000:9000" # HDFS RPC
    volumes:
      - namenode_data:/hadoop/dfs/name
    environment:
      - CLUSTER_NAME=pqg6
    networks:
      - pqg6-net
    healthcheck:
      test: ["CMD", "hdfs", "dfs", "-ls", "/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    profiles: ["full", "ml"]

  datanode:
    build:
      context: ./modules/hdfs-storage
      dockerfile: Dockerfile.datanode
    image: hadoop-datanode:3.3.6
    container_name: datanode
    hostname: datanode
    volumes:
      - datanode_data:/hadoop/dfs/data
    environment:
      - CLUSTER_NAME=pqg6
    depends_on:
      namenode:
        condition: service_healthy
    networks:
      - pqg6-net
    profiles: ["full", "ml"]

  # ---- Kafka (KRaft) ----

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: kafka
    hostname: kafka
    ports:
      - "9092:9092"
      - "9093:9093"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: "broker,controller"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka:29093"
      KAFKA_LISTENERS: "PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:29093,EXTERNAL://0.0.0.0:9093"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://kafka:9092,EXTERNAL://localhost:9093"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_LOG_RETENTION_HOURS: 168
      CLUSTER_ID: "pqg6-kafka-cluster-001"
    volumes:
      - kafka_data:/var/lib/kafka/data
    networks:
      - pqg6-net
    healthcheck:
      test:
        [
          "CMD",
          "kafka-broker-api-versions",
          "--bootstrap-server",
          "localhost:9092",
        ]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    profiles: ["full", "dev", "ml"]

  kafka-init:
    image: confluentinc/cp-kafka:7.6.0
    container_name: kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: ["/bin/bash", "-c"]
    command: |
      "
      echo 'Creating Kafka topics...'
      kafka-topics --create --if-not-exists --topic network-flows    --partitions 3 --replication-factor 1 --bootstrap-server kafka:9092
      kafka-topics --create --if-not-exists --topic security-alerts  --partitions 1 --replication-factor 1 --bootstrap-server kafka:9092
      kafka-topics --create --if-not-exists --topic flow-statistics  --partitions 1 --replication-factor 1 --bootstrap-server kafka:9092
      echo 'Topics created:'
      kafka-topics --list --bootstrap-server kafka:9092
      "
    networks:
      - pqg6-net
    profiles: ["full", "dev", "ml"]

  # ---- Flink ----

  flink-jobmanager:
    build: ./modules/flink-processor
    image: pqg6-flink-processor:latest
    container_name: flink-jobmanager
    hostname: flink-jobmanager
    command: jobmanager
    ports:
      - "8081:8081" # Flink Web UI
    environment:
      - |
        FLINK_PROPERTIES=
        jobmanager.rpc.address: flink-jobmanager
        taskmanager.numberOfTaskSlots: 4
        parallelism.default: 2
      - KAFKA_BOOTSTRAP_SERVERS=${KAFKA_BOOTSTRAP_SERVERS}
      - KAFKA_TOPIC_FLOWS=${KAFKA_TOPIC_FLOWS}
      - KAFKA_TOPIC_ALERTS=${KAFKA_TOPIC_ALERTS}
      - KAFKA_TOPIC_STATS=${KAFKA_TOPIC_STATS}
      - FLINK_OUTPUT_PATH=${FLINK_OUTPUT_PATH}
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - pqg6-net
    profiles: ["full", "dev"]

  flink-taskmanager:
    build: ./modules/flink-processor
    image: pqg6-flink-processor:latest
    container_name: flink-taskmanager
    hostname: flink-taskmanager
    command: taskmanager
    environment:
      - |
        FLINK_PROPERTIES=
        jobmanager.rpc.address: flink-jobmanager
        taskmanager.numberOfTaskSlots: 4
      - KAFKA_BOOTSTRAP_SERVERS=${KAFKA_BOOTSTRAP_SERVERS}
    depends_on:
      - flink-jobmanager
    networks:
      - pqg6-net
    profiles: ["full", "dev"]

  # Auto-submit the Flink job once JobManager + TaskManager are ready
  flink-submit:
    image: pqg6-flink-processor:latest
    container_name: flink-submit
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        echo "Waiting for Flink JobManager REST API..."
        until curl -sf http://flink-jobmanager:8081/overview > /dev/null 2>&1; do sleep 2; done
        echo "JobManager ready. Waiting for TaskSlots..."
        until [ "$$(curl -sf http://flink-jobmanager:8081/overview | grep -o '"slots-available":[0-9]*' | cut -d: -f2)" -gt 0 ] 2>/dev/null; do sleep 2; done
        echo "TaskSlots available. Submitting Flink job..."
        flink run -d -m flink-jobmanager:8081 /opt/flink/usrlib/pqg6-flink-processor.jar
        echo "Flink job submitted."
    environment:
      - |
        FLINK_PROPERTIES=
        jobmanager.rpc.address: flink-jobmanager
      - KAFKA_BOOTSTRAP_SERVERS=${KAFKA_BOOTSTRAP_SERVERS}
      - FLINK_OUTPUT_PATH=${FLINK_OUTPUT_PATH}
    depends_on:
      - flink-jobmanager
      - flink-taskmanager
    networks:
      - pqg6-net
    restart: "no"
    profiles: ["full", "dev"]

  # ---- Spark ----

  spark-master:
    image: apache/spark:3.5.1
    container_name: spark-master
    hostname: spark-master
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.master.Master
    ports:
      - "8080:8080" # Spark Master UI
      - "7077:7077" # Spark Master RPC
    networks:
      - pqg6-net
    profiles: ["full", "ml"]

  spark-worker-1:
    image: apache/spark:3.5.1
    container_name: spark-worker-1
    hostname: spark-worker-1
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker spark://spark-master:7077
    environment:
      - SPARK_WORKER_MEMORY=2g
      - SPARK_WORKER_CORES=2
    depends_on:
      - spark-master
    networks:
      - pqg6-net
    profiles: ["full", "ml"]

  spark-worker-2:
    image: apache/spark:3.5.1
    container_name: spark-worker-2
    hostname: spark-worker-2
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker spark://spark-master:7077
    environment:
      - SPARK_WORKER_MEMORY=2g
      - SPARK_WORKER_CORES=2
    depends_on:
      - spark-master
    networks:
      - pqg6-net
    profiles: ["full", "ml"]

  spark-client:
    build: ./modules/spark-analytics
    image: pqg6-spark-analytics:latest
    container_name: spark-client
    hostname: spark-client
    environment:
      - SPARK_MASTER=${SPARK_MASTER}
      - HDFS_NAMENODE=${HDFS_NAMENODE}
      - KAFKA_BOOTSTRAP_SERVERS=${KAFKA_BOOTSTRAP_SERVERS}
    depends_on:
      - spark-master
    networks:
      - pqg6-net
    stdin_open: true
    tty: true
    profiles: ["full", "ml"]

  # ---- NS-3 Simulator ----

  ns3-simulator:
    build: ./modules/ns3-simulator
    image: pqg6-ns3-simulator:latest
    container_name: ns3-simulator
    hostname: ns3-simulator
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=${KAFKA_BOOTSTRAP_SERVERS}
      - KAFKA_TOPIC_FLOWS=${KAFKA_TOPIC_FLOWS}
      - HDFS_NAMENODE=${HDFS_NAMENODE}
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - pqg6-net
    profiles: ["full"]

  # ---- Dashboard ----

  dashboard:
    build: ./modules/dashboard
    image: pqg6-dashboard:latest
    container_name: pqg6-dashboard
    hostname: pqg6-dashboard
    ports:
      - "3000:3000" # Dashboard UI + API + WebSocket
    volumes:
      - //var/run/docker.sock:/var/run/docker.sock
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=${KAFKA_BOOTSTRAP_SERVERS}
      - KAFKA_TOPIC_ALERTS=${KAFKA_TOPIC_ALERTS}
      - KAFKA_TOPIC_STATS=${KAFKA_TOPIC_STATS}
      - HDFS_NAMENODE=${HDFS_NAMENODE}
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - pqg6-net
    profiles: ["full", "dev"]

# ---- Volumes ----

volumes:
  namenode_data:
  datanode_data:
  kafka_data:

# ---- Network ----

networks:
  pqg6-net:
    driver: bridge
    name: pqg6-net
