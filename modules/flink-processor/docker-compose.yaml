services:
  flink-jobmanager:
    build: .
    image: pqg6-flink-processor:latest
    container_name: flink-jobmanager
    command: jobmanager
    ports:
      - "8081:8081"
    environment:
      - |
        FLINK_PROPERTIES=
        jobmanager.rpc.address: flink-jobmanager
        taskmanager.numberOfTaskSlots: 4
        parallelism.default: 2
      - KAFKA_BOOTSTRAP_SERVERS=${KAFKA_BOOTSTRAP_SERVERS:-kafka:9092}
      - FLINK_OUTPUT_PATH=hdfs://namenode:9000/flink-output
    networks:
      - pqg6-net
    depends_on:
      kafka:
        condition: service_healthy
    profiles: ["dev", "ml", "full"]
    deploy:
      resources:
        limits:
          memory: 1g

  flink-taskmanager:
    image: pqg6-flink-processor:latest
    container_name: flink-taskmanager
    command: taskmanager
    environment:
      - |
        FLINK_PROPERTIES=
        jobmanager.rpc.address: flink-jobmanager
        taskmanager.numberOfTaskSlots: 4
        parallelism.default: 2
      - KAFKA_BOOTSTRAP_SERVERS=${KAFKA_BOOTSTRAP_SERVERS:-kafka:9092}
      - FLINK_OUTPUT_PATH=hdfs://namenode:9000/flink-output
    networks:
      - pqg6-net
    depends_on:
      - flink-jobmanager
    profiles: ["dev", "ml", "full"]
    deploy:
      resources:
        limits:
          memory: 1g

networks:
  pqg6-net:
    external: true
