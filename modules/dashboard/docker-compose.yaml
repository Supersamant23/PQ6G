services:
  dashboard:
    build: .
    image: pqg6-dashboard:latest
    container_name: pqg6-dashboard
    ports:
      - "3000:3000"
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=${KAFKA_BOOTSTRAP_SERVERS:-kafka:9092}
      - HDFS_NAMENODE=${HDFS_NAMENODE:-http://namenode:9870}
    networks:
      - pqg6-net
    profiles: ["dev", "ml", "full"]
    deploy:
      resources:
        limits:
          memory: 256m

networks:
  pqg6-net:
    external: true
